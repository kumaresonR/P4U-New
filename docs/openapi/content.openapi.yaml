openapi: 3.0.3
info:
  title: P4U Content API
  version: 1.0.0
  description: content-management-services — public reads and admin CRUD for brands, featured products, service highlights.
servers:
  - url: http://localhost:8080
    description: API gateway
tags:
  - name: Content
  - name: ContentAdmin
paths:
  /api/v1/content/public/health:
    get:
      tags: [Content]
      summary: Public health
      responses:
        '200':
          description: OK
  /api/v1/content/home:
    get:
      tags: [Content]
      summary: Home aggregate feed
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Home bundle
  /api/v1/content/brands:
    get:
      tags: [Content]
      summary: List brands
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: items and total
  /api/v1/content/admin/brands:
    post:
      tags: [ContentAdmin]
      summary: Create brand (ADMIN, content.admin.manage)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, imageUrl]
              properties:
                name:
                  type: string
                imageUrl:
                  type: string
                  format: uri
                redirectUrl:
                  type: string
                  nullable: true
                sortOrder:
                  type: integer
                isActive:
                  type: boolean
      responses:
        '201':
          description: Created
  /api/v1/content/admin/brands/{id}:
    get:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Brand
    patch:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated
    delete:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /api/v1/content/admin/featured-products:
    post:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /api/v1/content/admin/featured-products/{id}:
    get:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    patch:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    delete:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /api/v1/content/admin/service-highlights:
    post:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /api/v1/content/admin/service-highlights/{id}:
    get:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    patch:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    delete:
      tags: [ContentAdmin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
